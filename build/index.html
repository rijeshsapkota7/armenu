<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><meta name="theme-color" content="#080709"/><meta name="description" content="ARMenu — Smart AR Restaurant Menu System"/><title>ARMenu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<script defer="defer" src="/static/js/main.8d2f33ac.js"></script>
<link href="/static/css/main.8af3ac92.css" rel="stylesheet">
<link href="/static/css/premium.css" rel="stylesheet">
<script defer src="/static/js/premium-enhance.js"></script>
<style>
html{background:#080709}
body{background:#080709;color:#f2e8d5}
#armenu-loader{position:fixed;inset:0;background:#080709;display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.5s cubic-bezier(0.16,1,0.3,1),transform 0.5s cubic-bezier(0.16,1,0.3,1)}
#armenu-loader.hidden{opacity:0;pointer-events:none;transform:scale(1.02)}
#armenu-loader-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:2.8rem;font-weight:500;letter-spacing:-0.02em;background:linear-gradient(135deg,#d4a853 0%,#f0c97a 50%,#d4a853 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;animation:logoIn 0.8s cubic-bezier(0.16,1,0.3,1) both;text-align:center}
#armenu-loader-sub{font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(196,184,154,0.5);margin-bottom:28px;text-align:center;animation:logoIn 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both}
#armenu-loader-bar{width:120px;height:1px;background:rgba(212,168,83,0.15);border-radius:1px;overflow:hidden;margin:0 auto}
#armenu-loader-progress{height:100%;background:linear-gradient(90deg,transparent,#d4a853,#f0c97a,#d4a853,transparent);animation:loadBar 1.2s ease-in-out infinite}
@keyframes logoIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
</style>
</head>
<body>
<div id="armenu-loader">
  <div>
    <div id="armenu-loader-logo">ARMenu</div>
    <div id="armenu-loader-sub">Smart AR Restaurant System</div>
    <div id="armenu-loader-bar"><div id="armenu-loader-progress"></div></div>
  </div>
</div>
<noscript>You need JavaScript to run this app.</noscript>
<div id="root"></div>
<script>
(function(){
  var loader=document.getElementById('armenu-loader');
  var checks=0;
  var iv=setInterval(function(){
    checks++;
    var root=document.getElementById('root');
    if((root&&root.children.length>0)||checks>80){
      clearInterval(iv);
      setTimeout(function(){
        loader.classList.add('hidden');
        setTimeout(function(){if(loader.parentNode)loader.parentNode.removeChild(loader);},600);
      },400);
    }
  },100);
})();
</script>
</body></html>
